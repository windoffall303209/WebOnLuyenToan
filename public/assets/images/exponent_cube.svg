<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="100%" height="100%">
  <rect width="300" height="250" rx="15" fill="#0b0f19" stroke="#1f2937" stroke-width="2"/>
  
  <g transform="translate(150, 140)">
    <!-- Định nghĩa một khối lập phương isometric -->
    <!-- Chiều rộng dx=30, dy=17.3 -->
    
    <!-- TẦNG DƯỚI (4 khối) -->
    <!-- Khối sau cùng (0, 0, 0) -->
    <g transform="translate(0, -35)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#a78bfa" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#7c3aed" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#6d28d9" stroke="#4c1d95" stroke-width="1"/>
    </g>
    <!-- Khối trái (1, 0, 0) -->
    <g transform="translate(-26, -20)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#a78bfa" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#7c3aed" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#6d28d9" stroke="#4c1d95" stroke-width="1"/>
    </g>
    <!-- Khối phải (0, 1, 0) -->
    <g transform="translate(26, -20)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#a78bfa" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#7c3aed" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#6d28d9" stroke="#4c1d95" stroke-width="1"/>
    </g>
    <!-- Khối trước (1, 1, 0) -->
    <g transform="translate(0, -5)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#a78bfa" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#7c3aed" stroke="#4c1d95" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#6d28d9" stroke="#4c1d95" stroke-width="1"/>
    </g>

    <!-- TẦNG TRÊN (4 khối) -->
    <!-- Khối sau cùng (0, 0, 1) -->
    <g transform="translate(0, -65)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#f472b6" stroke="#9d174d" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#db2777" stroke="#9d174d" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#be185d" stroke="#9d174d" stroke-width="1"/>
    </g>
    <!-- Khối trái (1, 0, 1) -->
    <g transform="translate(-26, -50)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#f472b6" stroke="#9d174d" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#db2777" stroke="#9d174d" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#be185d" stroke="#9d174d" stroke-width="1"/>
    </g>
    <!-- Khối phải (0, 1, 1) -->
    <g transform="translate(26, -50)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#f472b6" stroke="#9d174d" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#db2777" stroke="#9d174d" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#be185d" stroke="#9d174d" stroke-width="1"/>
    </g>
    <!-- Khối trước (1, 1, 1) -->
    <g transform="translate(0, -35)">
      <polygon points="0,-15 26,0 0,15 -26,0" fill="#f472b6" stroke="#9d174d" stroke-width="1"/>
      <polygon points="-26,0 0,15 0,45 -26,30" fill="#db2777" stroke="#9d174d" stroke-width="1"/>
      <polygon points="26,0 0,15 0,45 26,30" fill="#be185d" stroke="#9d174d" stroke-width="1"/>
    </g>
  </g>
  
  <text x="150" y="225" fill="#f472b6" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Hình khối mô tả 2³ (2 x 2 x 2)</text>
</svg>
