<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="100%" height="100%">
  <rect width="250" height="250" rx="15" fill="#0b0f19" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Hình vuông -->
  <rect x="55" y="55" width="120" height="120" rx="5" fill="rgba(0, 255, 136, 0.1)" stroke="#00ff88" stroke-width="3" filter="drop-shadow(0px 0px 8px rgba(0, 255, 136, 0.4))"/>
  
  <!-- Nhãn các cạnh -->
  <text x="115" y="40" fill="#00ff88" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">5 cm</text>
  <text x="195" y="120" fill="#00ff88" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start">5 cm</text>
  
  <!-- Ký hiệu góc vuông -->
  <rect x="55" y="160" width="15" height="15" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <circle cx="62.5" cy="167.5" r="1.5" fill="#00ff88"/>
  
  <text x="125" y="215" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Hình vuông cạnh a = 5 cm</text>
</svg>
