<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="100%" height="100%">
  <rect width="300" height="250" rx="15" fill="#0b0f19" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Hình thoi d1 = 160px, d2 = 120px -->
  <!-- Đỉnh: Trên (150, 40), Dưới (150, 200), Trái (60, 120), Phải (240, 120) -->
  <polygon points="150,40 240,120 150,200 60,120" fill="rgba(255, 184, 0, 0.1)" stroke="#ffb800" stroke-width="3" filter="drop-shadow(0px 0px 8px rgba(255,184,0,0.4))"/>
  
  <!-- Các đường chéo -->
  <line x1="60" y1="120" x2="240" y2="120" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="150" y1="40" x2="150" y2="200" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Nhãn đường chéo -->
  <text x="100" y="110" fill="#00f0ff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">8 m</text>
  <text x="160" y="80" fill="#00f0ff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">6 m</text>
  
  <!-- Ký hiệu vuông góc ở giữa (150, 120) -->
  <polygon points="150,110 160,110 160,120 150,120" fill="none" stroke="#00f0ff" stroke-width="1"/>
  
  <text x="150" y="225" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Hình thoi với 2 đường chéo 8 m và 6 m</text>
</svg>
