<!-- HEADER -->
<header class="glass-header">
  <div class="header-left">
    <div class="logo" id="btn-logo-home">🌌 <span class="logo-text-small">Vũ Trụ Toán 6</span></div>
  </div>
  <div class="header-right">
    <div class="user-stats">
      <div class="stat-item level-badge" id="hud-level">Cấp 1</div>
      <div class="stat-item xp-bar-container">
        <span class="xp-label">XP: <span id="hud-xp-text">0/100</span></span>
        <div class="xp-bar-bg">
          <div class="xp-bar-fill" id="hud-xp-fill" style="width: 0%"></div>
        </div>
      </div>
      <div class="stat-item stars-badge">⭐ <span id="hud-stars">0</span></div>
      <div class="stat-item username-badge" id="hud-username">Phi hành gia</div>
      <button id="theme-toggle" class="btn-icon" title="Đổi giao diện">🌓</button>
      <button id="btn-logout" class="btn-icon" title="Đăng xuất">🚪</button>
    </div>
  </div>
</header>
