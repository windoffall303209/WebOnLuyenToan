<!-- 10. GIAO DIỆN BẢN ĐỒ VÀNG THÀNH TÍCH -->
<div id="achievements-view" class="app-view">
  <h2 class="text-center"><i data-lucide="award" class="lucide-icon glow-yellow"></i> Bảng Vàng Huy Hiệu Thành Tích</h2>
  <p class="text-center subtitle">Hoàn thành các thử thách toán học để thăng cấp phi hành gia và mở khóa huy hiệu</p>
  
  <div class="badges-grid" id="badges-container">
    <!-- Nạp động từ achievements.js -->
  </div>

  <!-- Nhật ký học tập (Lịch sử làm bài) -->
  <div class="history-section glass-card" style="margin-top: 3rem;">
    <h3 class="section-title" style="font-family: var(--font-logo); margin-bottom: 1.5rem;"><i data-lucide="history" class="lucide-icon glow-cyan"></i> Nhật Ký Luyện Tập Của Em</h3>
    <div class="table-responsive">
      <table class="history-table">
        <thead>
          <tr>
            <th>Bài Học</th>
            <th>Kết Quả</th>
            <th>XP Nhận Được</th>
            <th>Sao Nhận Được</th>
            <th>Thời Gian</th>
          </tr>
        </thead>
        <tbody id="history-table-body">
          <tr>
            <td colspan="5" class="text-center">Chưa có lịch sử làm bài. Hãy làm bài tập để tích lũy thành tích nhé!</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
